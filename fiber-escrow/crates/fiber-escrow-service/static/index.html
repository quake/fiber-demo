<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fiber Escrow Demo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            min-height: 100vh;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            margin-bottom: 20px;
        }
        h1 {
            font-size: 1.5rem;
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .user-selector {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .user-selector label {
            font-size: 0.9rem;
            color: #888;
        }
        select {
            padding: 8px 16px;
            border-radius: 8px;
            border: 1px solid #3a7bd5;
            background: #1a1a2e;
            color: #fff;
            cursor: pointer;
        }
        .balance {
            padding: 8px 16px;
            background: rgba(0,210,255,0.1);
            border-radius: 8px;
            font-weight: bold;
            color: #00d2ff;
        }
        .tabs {
            display: flex;
            gap: 4px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 12px 24px;
            background: rgba(255,255,255,0.05);
            border: none;
            border-radius: 8px 8px 0 0;
            color: #888;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tab:hover {
            background: rgba(255,255,255,0.1);
        }
        .tab.active {
            background: rgba(58,123,213,0.3);
            color: #fff;
        }
        .tab-content {
            display: none;
            background: rgba(255,255,255,0.03);
            border-radius: 0 12px 12px 12px;
            padding: 20px;
            min-height: 400px;
        }
        .tab-content.active {
            display: block;
        }
        .card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 12px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .card-subtitle {
            font-size: 0.85rem;
            color: #888;
        }
        .price {
            font-size: 1.2rem;
            font-weight: bold;
            color: #00d2ff;
        }
        .status {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 600;
        }
        .status.waiting_payment { background: #f39c12; color: #000; }
        .status.funded { background: #3498db; color: #fff; }
        .status.shipped { background: #9b59b6; color: #fff; }
        .status.completed { background: #2ecc71; color: #000; }
        .status.disputed { background: #e74c3c; color: #fff; }
        .status.refunded { background: #95a5a6; color: #000; }
        .btn {
            padding: 8px 16px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }
        .btn-primary {
            background: linear-gradient(90deg, #00d2ff, #3a7bd5);
            color: #fff;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(0,210,255,0.3);
        }
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-success {
            background: #2ecc71;
            color: #000;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 0.9rem;
            color: #888;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background: rgba(255,255,255,0.05);
            color: #fff;
        }
        .form-group textarea {
            min-height: 80px;
            resize: vertical;
        }
        .actions {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            align-items: center;
            justify-content: center;
            z-index: 100;
        }
        .modal.active {
            display: flex;
        }
        .modal-content {
            background: #1a1a2e;
            border-radius: 12px;
            padding: 24px;
            max-width: 400px;
            width: 90%;
        }
        .modal-header {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .role-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: 8px;
        }
        .role-buyer { background: #3498db; }
        .role-seller { background: #9b59b6; }
        .system-controls {
            margin-top: 20px;
            padding: 16px;
            background: rgba(255,255,255,0.03);
            border-radius: 8px;
        }
        .system-controls h3 {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 12px;
        }
        .tick-controls {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        .toast {
            position: fixed;
            bottom: 20px;
            right: 20px;
            padding: 12px 24px;
            background: #2ecc71;
            color: #000;
            border-radius: 8px;
            font-weight: 600;
            transform: translateY(100px);
            opacity: 0;
            transition: all 0.3s;
            z-index: 200;
        }
        .toast.active {
            transform: translateY(0);
            opacity: 1;
        }
        .toast.error {
            background: #e74c3c;
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Fiber Escrow Demo</h1>
            <div class="user-selector">
                <label>Acting as:</label>
                <select id="userSelect" onchange="switchUser()">
                    <option value="">Loading...</option>
                </select>
                <div class="balance" id="balance">0 shannons</div>
            </div>
        </header>

        <div class="tabs">
            <button id="tab-market" class="tab active" onclick="showTab('market')">Market</button>
            <button id="tab-orders" class="tab" onclick="showTab('orders')">My Orders</button>
            <button id="tab-arbiter" class="tab" onclick="showTab('arbiter')">Arbiter</button>
        </div>

        <!-- Market Tab -->
        <div id="market" class="tab-content active">
            <div id="productList"></div>
        </div>

        <!-- My Orders Tab -->
        <div id="orders" class="tab-content">
            <div id="orderList"></div>
        </div>

        <!-- Arbiter Tab -->
        <div id="arbiter" class="tab-content">
            <h3 style="margin-bottom: 16px;">Disputed Orders</h3>
            <div id="disputeList"></div>
            
            <div class="system-controls">
                <h3>Time Simulation (for testing auto-confirm)</h3>
                <div class="tick-controls">
                    <button class="btn btn-secondary" onclick="advanceTime(3600)">+1 hour</button>
                    <button class="btn btn-secondary" onclick="advanceTime(86400)">+1 day</button>
                    <button class="btn btn-secondary" onclick="advanceTime(86400 * 7)">+1 week</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Dispute Modal -->
    <div id="disputeModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">File Dispute</div>
            <div class="form-group">
                <label>Reason for dispute</label>
                <textarea id="disputeReason" placeholder="Describe the issue..."></textarea>
            </div>
            <div class="actions">
                <button class="btn btn-danger" onclick="submitDispute()">Submit Dispute</button>
                <button class="btn btn-secondary" onclick="closeDisputeModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Purchase Confirmation Modal -->
    <div id="purchaseModal" class="modal">
        <div class="modal-content" style="max-width: 500px;">
            <div class="modal-header">Confirm Purchase</div>
            <div id="purchaseDetails" style="margin-bottom: 16px;">
                <p><strong>Product:</strong> <span id="purchaseProductTitle"></span></p>
                <p><strong>Price:</strong> <span id="purchasePrice"></span> shannons</p>
            </div>
            <div id="purchaseInvoiceSection" style="display: none; margin-bottom: 16px;">
                <p style="color: #888; font-size: 0.85rem; margin-bottom: 8px;">Invoice created. Click "Confirm & Pay" to send payment from your Fiber node.</p>
                <div style="background: rgba(0,0,0,0.3); padding: 8px; border-radius: 4px; word-break: break-all; font-size: 0.75rem; color: #aaa;">
                    <span id="purchaseInvoice"></span>
                </div>
            </div>
            <div id="purchaseLoading" style="display: none; text-align: center; padding: 20px; color: #888;">
                Creating invoice...
            </div>
            <div id="purchaseError" style="display: none; color: #e74c3c; margin-bottom: 12px;"></div>
            <div class="actions">
                <button id="purchaseConfirmBtn" class="btn btn-primary" onclick="confirmPurchase()" disabled>
                    Confirm & Pay
                </button>
                <button class="btn btn-secondary" onclick="closePurchaseModal()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script>
        let currentUserId = null;
        let users = [];
        let disputeOrderId = null;
        // Purchase modal state
        let pendingPurchase = null; // {productId, productTitle, price, orderId, paymentHash, preimageHex}
        // Store preimages locally (in real app, would be in secure storage)
        let orderPreimages = {};

        // Fiber RPC URLs (fetched from backend /api/config)
        let sellerFiberRpcUrl = null;
        let buyerFiberRpcUrl = null;

        // Track which orders we already created invoices for / settled (prevent duplicates)
        const invoiceCreatedFor = new Set();
        const settledFor = new Set();

        // ============ Fiber RPC helpers ============

        /**
         * Generic JSON-RPC 2.0 call to a Fiber node.
         */
        async function fiberRpc(rpcUrl, method, params) {
            const body = {
                jsonrpc: '2.0',
                id: 1,
                method,
                params: [params],
            };
            console.log(`[FiberRPC] ${method} ->`, JSON.stringify(body));
            const resp = await fetch(rpcUrl, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body),
            });
            const data = await resp.json();
            console.log(`[FiberRPC] ${method} <-`, JSON.stringify(data));
            if (data.error) {
                throw new Error(data.error.message || JSON.stringify(data.error));
            }
            return data.result;
        }

        /**
         * Create a hold invoice (new_invoice) on a Fiber node.
         * paymentHash must be 0x-prefixed hex (32 bytes).
         */
        async function fiberNewInvoice(rpcUrl, paymentHash, amountShannons, description) {
            const FINAL_EXPIRY_DELTA_MS = 9_600_000; // 160 minutes (Fiber minimum)
            const EXPIRY_SECS = 86400; // 24 hours
            const result = await fiberRpc(rpcUrl, 'new_invoice', {
                amount: '0x' + amountShannons.toString(16),
                currency: 'Fibt',
                payment_hash: paymentHash,
                expiry: '0x' + EXPIRY_SECS.toString(16),
                final_expiry_delta: '0x' + FINAL_EXPIRY_DELTA_MS.toString(16),
                description: description || 'Fiber Escrow Payment',
            });
            return result.invoice_address; // the invoice string
        }

        /**
         * Pay an invoice via send_payment.
         */
        async function fiberSendPayment(rpcUrl, invoiceString) {
            const result = await fiberRpc(rpcUrl, 'send_payment', {
                invoice: invoiceString,
            });
            const status = (result.status || 'unknown').toLowerCase();
            if (['success', 'inflight', 'created'].includes(status)) {
                return result;
            }
            throw new Error(`Payment failed: ${result.failed_error || status}`);
        }

        /**
         * Settle a hold invoice with preimage (claim held funds).
         * Both paymentHash and preimage must be 0x-prefixed hex.
         */
        async function fiberSettleInvoice(rpcUrl, paymentHash, preimage) {
            return await fiberRpc(rpcUrl, 'settle_invoice', {
                payment_hash: paymentHash,
                payment_preimage: preimage,
            });
        }

        /**
         * Cancel a hold invoice (refund held funds).
         * paymentHash must be 0x-prefixed hex.
         */
        async function fiberCancelInvoice(rpcUrl, paymentHash) {
            return await fiberRpc(rpcUrl, 'cancel_invoice', {
                payment_hash: paymentHash,
            });
        }

        /**
         * Get total local balance across all channels (in shannons).
         */
        async function fiberGetBalance(rpcUrl) {
            const result = await fiberRpc(rpcUrl, 'list_channels', {});
            const channels = result.channels || [];
            let total = 0;
            for (const ch of channels) {
                const hex = ch.local_balance || '0x0';
                total += parseInt(hex, 16) || 0;
            }
            return total;
        }

        /**
         * Get the current user's Fiber RPC URL based on their role.
         */
        function getCurrentFiberRpcUrl() {
            const user = users.find(u => u.id === currentUserId);
            if (!user) return null;
            const username = user.username.toLowerCase();
            if (username === 'seller') return sellerFiberRpcUrl;
            if (username === 'buyer') return buyerFiberRpcUrl;
            return null;
        }

        // ============ Crypto helpers ============

        async function generatePreimage() {
            const preimage = new Uint8Array(32);
            crypto.getRandomValues(preimage);
            return preimage;
        }

        function bytesToHex(bytes) {
            return '0x' + Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
        }

        function hexToBytes(hex) {
            const cleanHex = hex.startsWith('0x') ? hex.slice(2) : hex;
            const bytes = new Uint8Array(cleanHex.length / 2);
            for (let i = 0; i < bytes.length; i++) {
                bytes[i] = parseInt(cleanHex.substr(i * 2, 2), 16);
            }
            return bytes;
        }

        // ============ API helpers ============

        async function api(method, path, body = null) {
            const headers = { 'Content-Type': 'application/json' };
            if (currentUserId) {
                headers['X-User-Id'] = currentUserId;
            }
            const options = { method, headers };
            if (body) {
                options.body = JSON.stringify(body);
            }
            const res = await fetch('/api' + path, options);
            return res.json();
        }

        function showToast(message, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast active' + (isError ? ' error' : '');
            setTimeout(() => toast.className = 'toast', 3000);
        }

        // ============ Tab navigation ============

        function showTab(tabId) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab-content#${tabId}`).classList.add('active');
            document.querySelectorAll('.tab')[['market', 'orders', 'arbiter'].indexOf(tabId)].classList.add('active');
            refresh();
        }

        // ============ User management ============

        async function loadUsers() {
            const data = await api('GET', '/users');
            let rawUsers = data.users || [];
            
            // Sort users in order: buyer, seller, arbiter
            const order = ['buyer', 'seller', 'arbiter'];
            users = rawUsers.sort((a, b) => {
                let idxA = order.indexOf(a.username.toLowerCase());
                let idxB = order.indexOf(b.username.toLowerCase());
                if (idxA === -1) idxA = 99;
                if (idxB === -1) idxB = 99;
                return idxA - idxB;
            });

            const select = document.getElementById('userSelect');
            select.innerHTML = users.map(u => 
                `<option value="${u.id}">${u.username}</option>`
            ).join('');
            if (users.length > 0) {
                currentUserId = users[0].id;
                updateTabVisibility();
                updateBalance();
            }
        }

        async function loadConfig() {
            try {
                const data = await api('GET', '/config');
                sellerFiberRpcUrl = data.seller_fiber_rpc_url || null;
                buyerFiberRpcUrl = data.buyer_fiber_rpc_url || null;
                console.log('Fiber config:', { sellerFiberRpcUrl, buyerFiberRpcUrl });
            } catch (e) {
                console.warn('Failed to load Fiber config:', e);
            }
        }

        async function switchUser() {
            currentUserId = document.getElementById('userSelect').value;
            updateTabVisibility();
            await updateBalance();
            refresh();
        }

        function updateTabVisibility() {
            const user = users.find(u => u.id === currentUserId);
            if (!user) return;

            const username = user.username.toLowerCase();
            const tabMarket = document.getElementById('tab-market');
            const tabOrders = document.getElementById('tab-orders');
            const tabArbiter = document.getElementById('tab-arbiter');
            const balanceElement = document.getElementById('balance');

            tabMarket.style.display = 'none';
            tabOrders.style.display = 'none';
            tabArbiter.style.display = 'none';
            balanceElement.style.display = 'block';

            if (username === 'arbiter') {
                tabArbiter.style.display = 'block';
                balanceElement.style.display = 'none';
                const activeTab = document.querySelector('.tab-content.active').id;
                if (activeTab !== 'arbiter') showTab('arbiter');
            } else if (username === 'seller') {
                tabOrders.style.display = 'block';
                const activeTab = document.querySelector('.tab-content.active').id;
                if (activeTab !== 'orders') showTab('orders');
            } else if (username === 'buyer') {
                tabMarket.style.display = 'block';
                tabOrders.style.display = 'block';
                const activeTab = document.querySelector('.tab-content.active').id;
                if (activeTab === 'arbiter') showTab('market');
            }
        }

        async function updateBalance() {
            if (!currentUserId) return;
            const rpcUrl = getCurrentFiberRpcUrl();
            if (rpcUrl) {
                // Get real balance from Fiber node
                try {
                    const balance = await fiberGetBalance(rpcUrl);
                    document.getElementById('balance').textContent = `${balance.toLocaleString()} shannons`;
                    return;
                } catch (e) {
                    console.warn('Failed to get Fiber balance:', e);
                }
            }
            // Fallback: get simulated balance from backend
            const data = await api('GET', '/user/me');
            if (data.balance_shannons !== undefined) {
                document.getElementById('balance').textContent = `${data.balance_shannons.toLocaleString()} shannons`;
            }
        }

        // ============ Products ============

        async function loadProducts() {
            const data = await api('GET', '/products');
            const list = document.getElementById('productList');
            const products = data.products || [];
            
            if (products.length === 0) {
                list.innerHTML = '<div class="empty-state">No products available.</div>';
                return;
            }

            list.innerHTML = products.map(p => `
                <div class="card">
                    <div class="card-header">
                        <div>
                            <div class="card-title">${escapeHtml(p.title)}</div>
                            <div class="card-subtitle">by ${escapeHtml(p.seller_username || 'Unknown')}</div>
                        </div>
                        <div class="price">${p.price_shannons.toLocaleString()} shannons</div>
                    </div>
                    <p style="color: #aaa; font-size: 0.9rem;">${escapeHtml(p.description)}</p>
                    <div class="actions">
                        <button class="btn btn-primary" onclick="buyProduct('${p.id}')" 
                            ${p.seller_id === currentUserId ? 'disabled title="Your own product"' : ''}>
                            Buy Now
                        </button>
                    </div>
                </div>
            `).join('');
        }

        // ============ Buy flow ============

        async function buyProduct(productId) {
            // Get product info for display
            const productsData = await api('GET', '/products');
            const product = (productsData.products || []).find(p => p.id === productId);
            if (!product) {
                showToast('Product not found', true);
                return;
            }

            // Show modal with loading state
            document.getElementById('purchaseProductTitle').textContent = product.title;
            document.getElementById('purchasePrice').textContent = product.price_shannons.toLocaleString();
            document.getElementById('purchaseInvoiceSection').style.display = 'none';
            document.getElementById('purchaseLoading').style.display = 'block';
            document.getElementById('purchaseLoading').textContent = 'Creating order...';
            document.getElementById('purchaseError').style.display = 'none';
            document.getElementById('purchaseConfirmBtn').disabled = true;
            document.getElementById('purchaseConfirmBtn').textContent = 'Waiting for seller invoice...';
            document.getElementById('purchaseModal').classList.add('active');

            // Generate preimage and create order
            const preimage = await generatePreimage();
            const preimageHex = bytesToHex(preimage);

            const data = await api('POST', '/orders', { 
                product_id: productId,
                preimage: preimageHex
            });

            document.getElementById('purchaseLoading').style.display = 'none';

            if (data.order_id) {
                // Store preimage locally
                orderPreimages[data.order_id] = preimageHex;
                localStorage.setItem(`preimage_${data.order_id}`, preimageHex);

                pendingPurchase = {
                    productId: productId,
                    productTitle: product.title,
                    price: product.price_shannons,
                    orderId: data.order_id,
                    paymentHash: data.payment_hash,
                    preimageHex: preimageHex
                };

                // Order created. Now we need seller to create invoice.
                // In mock mode (no Fiber URLs), just close and show order.
                if (!sellerFiberRpcUrl) {
                    closePurchaseModal();
                    showToast('Order created (mock mode). Seller needs to submit invoice.');
                    refresh();
                } else {
                    // Show waiting message - seller needs to create invoice on their node
                    // (In a real app, seller's frontend would poll for new orders)
                    document.getElementById('purchaseError').textContent = 
                        'Order created! Waiting for seller to create invoice on their Fiber node. ' +
                        'Switch to seller role, go to My Orders, and click "Create Invoice" to continue.';
                    document.getElementById('purchaseError').style.display = 'block';
                    document.getElementById('purchaseError').style.color = '#f39c12';
                    closePurchaseModal();
                    showToast('Order created! Seller needs to create invoice.');
                    refresh();
                }
            } else {
                document.getElementById('purchaseError').textContent = data.error || 'Failed to create order';
                document.getElementById('purchaseError').style.display = 'block';
            }
        }

        function closePurchaseModal() {
            document.getElementById('purchaseModal').classList.remove('active');
            pendingPurchase = null;
        }

        // ============ Order actions ============

        async function loadOrders() {
            const data = await api('GET', '/orders/mine');
            const list = document.getElementById('orderList');
            const orders = data.orders || [];
            
            if (orders.length === 0) {
                list.innerHTML = '<div class="empty-state">No orders yet. Browse the Market to buy something!</div>';
                return;
            }

            list.innerHTML = orders.map(o => {
                const isBuyer = o.buyer_id === currentUserId;
                const isSeller = o.seller_id === currentUserId;
                return `
                <div class="card">
                    <div class="card-header">
                        <div>
                            <div class="card-title">
                                ${escapeHtml(o.product_title)}
                                <span class="role-badge ${isBuyer ? 'role-buyer' : 'role-seller'}">
                                    ${isBuyer ? 'Buyer' : 'Seller'}
                                </span>
                            </div>
                            <div class="card-subtitle">Order #${o.id.slice(0, 8)}</div>
                        </div>
                        <div>
                            <span class="status ${o.status}">${formatStatus(o.status)}</span>
                            <div class="price" style="margin-top: 4px;">${o.amount_shannons.toLocaleString()} shannons</div>
                        </div>
                    </div>
                    ${o.invoice_string ? `<p style="color: #888; font-size: 0.75rem; word-break: break-all; margin-bottom: 8px;">Invoice: ${escapeHtml(o.invoice_string.slice(0, 50))}...</p>` : ''}
                    ${o.dispute ? `<p style="color: #e74c3c; font-size: 0.9rem;">Dispute: ${escapeHtml(o.dispute.reason)}</p>` : ''}
                    <div class="actions">
                        ${getOrderActions(o, isBuyer, isSeller)}
                    </div>
                </div>
            `}).join('');
        }

        function formatStatus(status) {
            return status.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        function getOrderActions(order, isBuyer, isSeller) {
            const actions = [];
            
            // Seller: create invoice for orders waiting payment (no invoice yet)
            if (isSeller && order.status === 'waiting_payment' && !order.invoice_string) {
                actions.push(`<button class="btn btn-primary" onclick="createInvoiceForOrder('${order.id}', '${order.payment_hash}', ${order.amount_shannons})">Create Invoice</button>`);
            }
            // Buyer: pay order (invoice available, waiting payment)
            if (isBuyer && order.status === 'waiting_payment' && order.invoice_string) {
                actions.push(`<button class="btn btn-primary" onclick="payOrder('${order.id}')">Pay Now</button>`);
            }
            // Buyer: waiting for seller to create invoice
            if (isBuyer && order.status === 'waiting_payment' && !order.invoice_string) {
                actions.push(`<span style="color: #f39c12; font-size: 0.85rem;">Waiting for seller invoice...</span>`);
            }
            // Seller: ship
            if (isSeller && order.status === 'funded') {
                actions.push(`<button class="btn btn-primary" onclick="shipOrder('${order.id}')">Mark Shipped</button>`);
            }
            // Buyer: confirm receipt or dispute
            if (isBuyer && order.status === 'shipped') {
                actions.push(`<button class="btn btn-success" onclick="confirmOrder('${order.id}')">Confirm Receipt</button>`);
                actions.push(`<button class="btn btn-danger" onclick="openDisputeModal('${order.id}')">Dispute</button>`);
            }
            if (isBuyer && order.status === 'funded') {
                actions.push(`<button class="btn btn-danger" onclick="openDisputeModal('${order.id}')">Dispute</button>`);
            }
            // Seller: settle invoice (order completed, preimage available)
            if (isSeller && order.status === 'completed' && order.invoice_string) {
                actions.push(`<button class="btn btn-success" onclick="settleOrderInvoice('${order.id}')">Settle Invoice</button>`);
            }
            
            return actions.join('');
        }

        /**
         * Seller creates a hold invoice on their Fiber node and submits it to the escrow.
         */
        async function createInvoiceForOrder(orderId, paymentHash, amountShannons) {
            if (invoiceCreatedFor.has(orderId)) {
                showToast('Invoice already created for this order', true);
                return;
            }

            if (!sellerFiberRpcUrl) {
                // Mock mode: submit a fake invoice string
                const fakeInvoice = `mock_invoice_${paymentHash}`;
                const submitData = await api('POST', `/orders/${orderId}/invoice`, { invoice: fakeInvoice });
                if (submitData.status === 'invoice_submitted') {
                    invoiceCreatedFor.add(orderId);
                    showToast('Invoice submitted (mock mode)');
                    refresh();
                } else {
                    showToast(submitData.error || 'Failed to submit invoice', true);
                }
                return;
            }

            showToast('Creating invoice on your Fiber node...');
            try {
                const invoiceString = await fiberNewInvoice(
                    sellerFiberRpcUrl,
                    paymentHash,
                    amountShannons,
                    `Escrow order ${orderId.slice(0, 8)}`
                );
                console.log('Created invoice:', invoiceString);

                // Submit invoice to escrow backend
                const submitData = await api('POST', `/orders/${orderId}/invoice`, { invoice: invoiceString });
                if (submitData.status === 'invoice_submitted') {
                    invoiceCreatedFor.add(orderId);
                    showToast('Invoice created and submitted! Buyer can now pay.');
                    refresh();
                } else {
                    showToast(submitData.error || 'Failed to submit invoice', true);
                }
            } catch (e) {
                showToast(`Failed to create invoice: ${e.message}`, true);
            }
        }

        /**
         * Buyer pays for an order by sending payment to the invoice on their Fiber node.
         */
        async function payOrder(orderId) {
            const orderData = await api('GET', `/orders/${orderId}`);
            if (!orderData.invoice_string) {
                showToast('No invoice available yet', true);
                return;
            }

            if (!buyerFiberRpcUrl) {
                // Mock mode: just notify escrow
                const verifyData = await api('POST', `/orders/${orderId}/pay`);
                if (verifyData.status === 'funded') {
                    showToast('Payment confirmed (mock mode)! Waiting for seller to ship.');
                } else {
                    showToast(verifyData.error || 'Failed to confirm payment', true);
                }
                refresh();
                return;
            }

            showToast('Sending payment via your Fiber node...');
            try {
                const paymentResult = await fiberSendPayment(buyerFiberRpcUrl, orderData.invoice_string);
                console.log('Payment result:', paymentResult);

                showToast('Payment sent! Notifying escrow...');

                // Wait briefly for payment to propagate
                await new Promise(resolve => setTimeout(resolve, 1000));

                // Notify escrow
                const verifyData = await api('POST', `/orders/${orderId}/pay`);
                if (verifyData.status === 'funded') {
                    showToast('Payment confirmed! Waiting for seller to ship.');
                } else {
                    showToast('Payment sent! Escrow notified.');
                }
                refresh();
            } catch (e) {
                showToast(`Payment error: ${e.message}`, true);
            }
        }

        async function shipOrder(orderId) {
            const data = await api('POST', `/orders/${orderId}/ship`);
            if (data.status === 'shipped') {
                showToast('Marked as shipped! Waiting for buyer confirmation.');
                refresh();
            } else {
                showToast(data.error || 'Failed to ship', true);
            }
        }

        async function confirmOrder(orderId) {
            const data = await api('POST', `/orders/${orderId}/confirm`, {});
            if (data.status === 'completed') {
                delete orderPreimages[orderId];
                localStorage.removeItem(`preimage_${orderId}`);
                showToast('Order completed! Seller can now settle the invoice.');
                refresh();
            } else {
                showToast(data.error || 'Failed to confirm', true);
            }
        }

        /**
         * Seller settles the hold invoice on their Fiber node using the preimage.
         */
        async function settleOrderInvoice(orderId) {
            if (settledFor.has(orderId)) {
                showToast('Invoice already settled for this order', true);
                return;
            }

            // Get order details to get preimage
            const orderData = await api('GET', `/orders/${orderId}`);
            if (!orderData.preimage) {
                showToast('Preimage not available yet', true);
                return;
            }
            if (!orderData.payment_hash) {
                showToast('Payment hash not available', true);
                return;
            }

            if (!sellerFiberRpcUrl) {
                // Mock mode
                settledFor.add(orderId);
                showToast('Invoice settled (mock mode)');
                refresh();
                return;
            }

            showToast('Settling invoice on your Fiber node...');
            try {
                // Ensure both have 0x prefix
                const preimage = orderData.preimage.startsWith('0x') ? orderData.preimage : '0x' + orderData.preimage;
                const paymentHash = orderData.payment_hash.startsWith('0x') ? orderData.payment_hash : '0x' + orderData.payment_hash;

                await fiberSettleInvoice(sellerFiberRpcUrl, paymentHash, preimage);
                settledFor.add(orderId);
                showToast('Invoice settled! Funds received.');
                refresh();
            } catch (e) {
                showToast(`Failed to settle invoice: ${e.message}`, true);
            }
        }

        // ============ Disputes ============

        function openDisputeModal(orderId) {
            disputeOrderId = orderId;
            document.getElementById('disputeModal').classList.add('active');
        }

        function closeDisputeModal() {
            disputeOrderId = null;
            document.getElementById('disputeReason').value = '';
            document.getElementById('disputeModal').classList.remove('active');
        }

        async function submitDispute() {
            const reason = document.getElementById('disputeReason').value.trim();
            if (!reason) {
                showToast('Please provide a reason', true);
                return;
            }
            const data = await api('POST', `/orders/${disputeOrderId}/dispute`, { reason });
            if (data.status === 'disputed') {
                showToast('Dispute filed successfully');
                closeDisputeModal();
                refresh();
            } else {
                showToast(data.error || 'Failed to file dispute', true);
            }
        }

        async function loadDisputes() {
            const data = await api('GET', '/arbiter/disputes');
            const list = document.getElementById('disputeList');
            const disputes = data.disputes || [];
            
            if (disputes.length === 0) {
                list.innerHTML = '<div class="empty-state">No disputes to resolve.</div>';
                return;
            }

            list.innerHTML = disputes.map(o => `
                <div class="card">
                    <div class="card-header">
                        <div>
                            <div class="card-title">${escapeHtml(o.product_title)}</div>
                            <div class="card-subtitle">Order #${o.id.slice(0, 8)}</div>
                        </div>
                        <div class="price">${o.amount_shannons.toLocaleString()} shannons</div>
                    </div>
                    <p style="color: #e74c3c; margin: 8px 0; font-size: 0.9rem;">
                        <strong>Dispute reason:</strong> ${escapeHtml(o.dispute?.reason || 'N/A')}
                    </p>
                    <div class="actions">
                        <button class="btn btn-success" onclick="resolveDispute('${o.id}', 'seller')">
                            Release to Seller
                        </button>
                        <button class="btn btn-danger" onclick="resolveDispute('${o.id}', 'buyer')">
                            Refund Buyer
                        </button>
                    </div>
                </div>
            `).join('');
        }

        async function resolveDispute(orderId, resolution) {
            const data = await api('POST', `/arbiter/disputes/${orderId}/resolve`, { resolution });
            if (data.status === 'resolved') {
                showToast(`Dispute resolved in favor of ${resolution}`);

                // If resolved to seller and we have seller RPC, settle the invoice
                if (resolution === 'seller' && data.preimage && sellerFiberRpcUrl) {
                    try {
                        // Need to get the order's payment_hash
                        // The preimage is returned in the resolve response
                        const preimage = data.preimage.startsWith('0x') ? data.preimage : '0x' + data.preimage;
                        // We need to look up the order for payment_hash
                        // For now, arbiter doesn't settle - seller does when they see the completed order
                        console.log('Dispute resolved to seller, preimage available:', preimage);
                    } catch (e) {
                        console.warn('Auto-settle after dispute failed:', e);
                    }
                }

                // If resolved to buyer and we have seller RPC, cancel the invoice
                if (resolution === 'buyer' && sellerFiberRpcUrl) {
                    // Seller needs to cancel invoice on their node
                    // This would happen when seller views their orders
                    console.log('Dispute resolved to buyer - seller should cancel invoice');
                }

                refresh();
            } else {
                showToast(data.error || 'Failed to resolve', true);
            }
        }

        // ============ Time simulation ============

        async function advanceTime(seconds) {
            const data = await api('POST', '/system/tick', { seconds });
            const expired = data.expired_orders || [];
            if (expired.length > 0) {
                showToast(`${expired.length} order(s) auto-confirmed! Seller can settle invoices.`);
            } else {
                showToast(`Time advanced by ${seconds} seconds`);
            }
            refresh();
        }

        // ============ Utilities ============

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function refresh() {
            updateBalance();
            const activeTab = document.querySelector('.tab-content.active').id;
            if (activeTab === 'market') loadProducts();
            else if (activeTab === 'orders') loadOrders();
            else if (activeTab === 'arbiter') loadDisputes();
        }

        // ============ Initialize ============

        // Load stored preimages from localStorage
        for (let i = 0; i < localStorage.length; i++) {
            const key = localStorage.key(i);
            if (key.startsWith('preimage_')) {
                const orderId = key.replace('preimage_', '');
                orderPreimages[orderId] = localStorage.getItem(key);
            }
        }

        // Load config (Fiber RPC URLs) then users
        loadConfig().then(() => loadUsers().then(() => refresh()));
    </script>
</body>
</html>
